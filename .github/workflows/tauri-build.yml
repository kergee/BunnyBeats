name: Build Tauri App

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    strategy:
      fail-fast: false
      matrix:
        include:
          # Apple Silicon (arm64)
          - os: macos-latest
          # Intel Mac (x86_64), GitHub label: macos-15-intel
          - os: macos-15-intel
          - os: ubuntu-22.04
          - os: windows-latest

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          lfs: true

      - name: Fetch Git LFS assets
        run: git lfs pull

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20

      - name: Validate JSON data files
        shell: bash
        run: |
          node -e "JSON.parse(require('fs').readFileSync('songs.json', 'utf8'))" \
            && echo "songs.json OK"
          node -e "JSON.parse(require('fs').readFileSync('manifest.json', 'utf8'))" \
            && echo "manifest.json OK"
          node -e "JSON.parse(require('fs').readFileSync('src-tauri/tauri.conf.json', 'utf8'))" \
            && echo "tauri.conf.json OK"

      - name: Validate Tauri PNG icons
        run: |
          node -e "const fs=require('fs');const png='89504e470d0a1a0a';for(const file of ['src-tauri/icons/32x32.png','src-tauri/icons/128x128.png','src-tauri/icons/128x128@2x.png']){const sig=fs.readFileSync(file).subarray(0,8).toString('hex');if(sig!==png)throw new Error(file+' is not a PNG file; got signature '+sig);console.log(file+' OK')}"

      - name: Build dist folder (macOS/Linux)
        if: runner.os != 'Windows'
        run: |
          rm -rf dist
          mkdir dist
          rsync -a --delete --exclude src-tauri --exclude dist --exclude .git --exclude .github ./ dist/

      - name: Build dist folder (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          if (Test-Path dist) { Remove-Item dist -Recurse -Force }
          New-Item -ItemType Directory -Path dist | Out-Null
          robocopy . dist /E /XD src-tauri dist .git .github
          if ($LASTEXITCODE -gt 7) { exit $LASTEXITCODE }
          exit 0

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      - name: Build with Tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "BunnyBeats ${{ github.ref_name }}"
          releaseDraft: true
          prerelease: false
