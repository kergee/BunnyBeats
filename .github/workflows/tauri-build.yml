name: Build Tauri App

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
          - os: ubuntu-22.04
          - os: windows-latest

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Build dist folder (macOS/Linux)
        if: runner.os != 'Windows'
        run: |
          rm -rf dist
          mkdir dist
          rsync -a --delete --exclude src-tauri --exclude dist --exclude .git --exclude .github ./ dist/

      - name: Build dist folder (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          if (Test-Path dist) { Remove-Item dist -Recurse -Force }
          New-Item -ItemType Directory -Path dist | Out-Null
          robocopy . dist /E /XD src-tauri dist .git .github
          if ($LASTEXITCODE -gt 7) { exit $LASTEXITCODE }
          exit 0

      - name: Normalize icon PNGs to RGBA
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install pillow
          python - <<'PY'
          from pathlib import Path
          from PIL import Image

          icons_dir = Path("src-tauri/icons")
          if not icons_dir.exists():
              raise SystemExit("src-tauri/icons not found")

          for path in icons_dir.glob("*.png"):
              with Image.open(path) as img:
                  rgba = img.convert("RGBA")
                  rgba.save(path)
                  print(f"normalized {path}")
          PY

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      - name: Build with Tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "BunnyBeats ${{ github.ref_name }}"
          releaseDraft: true
          prerelease: false
