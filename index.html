<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Music Player</title>
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.json" />
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
      
      body {
        font-family: 'Inter', sans-serif;
        overflow: hidden; /* Prevent scroll on body */
      }
      
      /* Custom scrollbar for lyrics */
      
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      
      .no-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
      
      /* Vinyl Spin Animation */
      
      @keyframes spin {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }
      
      .animate-spin-slow {
        animation: spin 20s linear infinite;
      }
      
      .paused-anim {
        animation-play-state: paused;
      }

      /* Loading Screen */
      #app-loading {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #0f0f0f;
        color: #fff;
        font-family: 'Inter', sans-serif;
        z-index: 9999;
      }

      #app-loading .loading-icon {
        font-size: 56px;
        margin-bottom: 20px;
        animation: loading-bounce 1.4s ease-in-out infinite;
      }

      #app-loading .loading-title {
        font-size: 22px;
        font-weight: 600;
        letter-spacing: 0.02em;
        color: #e5e5e5;
        margin-bottom: 32px;
      }

      #app-loading .loading-dots {
        display: flex;
        gap: 8px;
      }

      #app-loading .loading-dots span {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #6366f1;
        animation: loading-dot 1.2s ease-in-out infinite;
      }

      #app-loading .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
      #app-loading .loading-dots span:nth-child(3) { animation-delay: 0.4s; }

      @keyframes loading-bounce {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-10px); }
      }

      @keyframes loading-dot {
        0%, 80%, 100% { opacity: 0.2; transform: scale(0.8); }
        40% { opacity: 1; transform: scale(1); }
      }
    </style>
